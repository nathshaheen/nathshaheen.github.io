---
title: Projects
---

<ul>
    {% for project in site.projects %}
    <li>
        <img src="{{ project.thumbnail }}" alt="Image" />
        <h2>{{ project.title }}</h2>
        <p>{% for tag in project.tags %}{{ tag }} {% endfor %}</p>
        <p>{{ project.description }}</p>
        <a href="{{ project.url }}">Learn more</a>
    </li>
    {% endfor %}
</ul>
