<h2 class="subtitle">{{ post.title }}</h2>
<p class="subsubtitle">{% for tag in post.tags %}{{ tag }} {% endfor %}</p>
<p class="subsubtitle">{{ post.date  | date_to_string }}</p>
<p class="body">{{ post.excerpt }}</p>
<a href="{{ post.url }}">
    <p class="button">Read more</p>
    <img src="" alt="Arrow">
</a>
