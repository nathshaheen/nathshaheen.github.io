<img src="{{ project.thumbnail }}" alt="Project thumbnail" />
<h2 class="subtitle">{{ project.title }}</h2>
<p class="subsubtitle">{% for tag in project.tags %}{{ tag }} {% endfor %}</p>
<p class="subsubtitle">{{ project.date  | date_to_string }}</p>
<p class="body">{{ project.description }}</p>
<a href="{{ project.url }}">
    <p class="button">Learn more</p>
    <img src="" alt="arrow">
</a>
